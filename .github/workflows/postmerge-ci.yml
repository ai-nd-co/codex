name: postmerge-ci

# This is the single entrypoint for main-only CI that is intentionally outside
# the merge-blocking suite. It keeps the broader postmerge signal in one run.
on:
  push:
    branches: [main]

jobs:
  # Materialize one unconditional job first. The v1 guard tried to solve fork
  # startup_failure with a job-level `if`, but GitHub still planned the
  # workflow as zero jobs on fork main pushes. Moving the decision into a real
  # bootstrap job keeps the workflow runnable and gates expensive work via an
  # explicit output instead of planner-time skipping.
  postmerge-bootstrap:
    name: postmerge bootstrap
    runs-on: ubuntu-24.04
    outputs:
      postmerge_enabled: ${{ steps.decide.outputs.postmerge_enabled }}
    steps:
      - id: decide
        env:
          CODEX_ENABLE_POSTMERGE_CI: ${{ vars.CODEX_ENABLE_POSTMERGE_CI }}
        run: |
          if [ "${GITHUB_REPOSITORY}" = "openai/codex" ] || [ "${CODEX_ENABLE_POSTMERGE_CI}" = "true" ]; then
            echo "postmerge_enabled=true" >> "${GITHUB_OUTPUT}"
            echo "postmerge-ci enabled"
          else
            echo "postmerge_enabled=false" >> "${GITHUB_OUTPUT}"
            echo "postmerge-ci is disabled unless CODEX_ENABLE_POSTMERGE_CI=true"
          fi

  # Keep reusable workflow calls alphabetized. Each child retains its own
  # workflow_dispatch trigger so maintainers can rerun flaky suites directly.
  rust-ci-full:
    needs: postmerge-bootstrap
    if: ${{ needs.postmerge-bootstrap.outputs.postmerge_enabled == 'true' }}
    name: rust-ci-full
    uses: ./.github/workflows/rust-ci-full.yml
    secrets: inherit

  v8-canary:
    needs: postmerge-bootstrap
    if: ${{ needs.postmerge-bootstrap.outputs.postmerge_enabled == 'true' }}
    name: v8-canary
    uses: ./.github/workflows/v8-canary.yml
    secrets: inherit

  results:
    if: ${{ always() && needs.postmerge-bootstrap.outputs.postmerge_enabled == 'true' }}
    name: Postmerge CI results
    needs:
      - postmerge-bootstrap
      - rust-ci-full
      - v8-canary
    runs-on: ubuntu-24.04
    steps:
      # Postmerge runs use the pushed main commit, so this helper always comes
      # from the same revision that defined the parent workflow.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Require successful dependencies
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: python3 .github/scripts/check_ci_results.py
