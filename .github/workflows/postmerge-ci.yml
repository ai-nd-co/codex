name: postmerge-ci

# This is the single entrypoint for main-only CI that is intentionally outside
# the merge-blocking suite. It keeps the broader postmerge signal in one run.
on:
  push:
    branches: [main]

jobs:
  # On this fork, any reusable-workflow references in postmerge-ci still cause
  # a startup_failure before GitHub materializes jobs at all. Keep the main
  # push entrypoint as a cheap stub instead; maintainers can still invoke the
  # heavier child workflows directly through workflow_dispatch when needed.
  postmerge-disabled-on-fork:
    name: postmerge-ci disabled on fork
    runs-on: ubuntu-24.04
    steps:
      - run: |
          echo "Fork main does not fan out postmerge CI automatically."
          echo "Use rust-ci-full or v8-canary via workflow_dispatch when needed."
